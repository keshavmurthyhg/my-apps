<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>{% block title %}Ops Platform{% endblock %}</title>

    <!-- Common CSS -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/common.css') }}">

    <!-- Module specific CSS -->
    {% block page_css %}
    {% endblock %}
</head>

<body>

<div class="app-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar compact-sidebar">

        <div class="sidebar-title">
            Ops Platform
        </div>

        {% block sidebar %}
        {% endblock %}

    </aside>


    <!-- MAIN CONTENT -->
    <div class="main-content">

        {% block top_nav %}
        {% endblock %}

        {% block toolbar %}
        {% endblock %}

        <main>
            {% block content %}
            {% endblock %}
        </main>

    </div>

</div>


<!-- Common JS -->
<script src="{{ url_for('static', filename='js/common.js') }}"></script>

<!-- Module JS -->
{% block page_js %}
{% endblock %}

</body>
</html>
